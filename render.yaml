# render.yaml — Render deployment config for SignBridge backend
services:
  - type: web
    name: signbridge-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
