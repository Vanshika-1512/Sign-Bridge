# netlify.toml — Frontend deployment config
[build]
  base    = "frontend"
  publish = "."

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy     = "camera=self"
